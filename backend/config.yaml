server:
  host: 0.0.0.0
  port: 3001
  debug: false
  url: http://localhost:3001
  cors_origins:
    - http://localhost:5177
    # 浏览器用 127.0.0.1 打开前端时 Origin 与 localhost 不同，需单独列出
    - http://127.0.0.1:5177
    - http://localhost:3000
    # Electron file:// 等场景下 fetch 可能携带 Origin: null
    - "null"

mysql:
  enabled: true
  host: localhost
  port: 3306
  user: root
  password: root
  database: workflow_manager
  charset: utf8mb4
  pool_size: 10

redis:
  enabled: true
  host: localhost
  port: 6379
  password: "123456"
  db: 0

owner:
  ip_addresses: "127.0.0.1,::1"

notion:
  client_id: ""
  client_secret: ""
  redirect_uri: "http://localhost:3001/mcp/oauth/callback/"

mcp:
  proxy_timeout: 90
  # 聊天中何时、选哪些 MCP（后端 Actor / ChatAgent）
  # 显式传 ext.mcp_servers 时始终优先；以下为未选手动列表时的自动策略
  chat:
    auto_select: true
    max_servers: 2
    # 用户输入与 MCP 名称/描述/metadata.keywords 的匹配分阈值（越高越保守）
    min_score: 2
    min_message_length: 6
    # 纯寒暄短句不自动走 MCP，减少无效 tools/list
    skip_greeting: true
    # 命中任一则在无分数匹配时仍取排序靠前的若干 MCP（兜底）
    intent_patterns:
      - "notion"
      - "\\bmcp\\b"
      - "工具"
      - "fetch"
      - "查询"
      - "查一下"
      - "搜索"
      - "调用"
      - "执行"

research:
  upload_max_mb: 512
  max_form_memory_mb: 64
  max_form_parts: 20000

# YouTube Data API v3（Chill 氛围音频，Key 仅后端使用）
youtube:
  api_key: "AIzaSyCr9BHXUglKPU3bwLADWa7j_811UiyvIS4"
  # 可选：监控这些频道的当前直播（频道 ID，以 UC 开头）
  default_live_channel_ids: []
  # 无配置频道时用于搜索直播的关键词
  fallback_live_search_query: "lofi hip hop radio live"

# 媒体生成按供应商配置（API Key 等）
media:
  runway:
    api_key: ""   # 可选，不配置则 Runway 接口返回 501
    api_base: "https://api.runwayml.com"
  veo:
    api_key: ""
    api_base: ""

# Google Drive 集成（用于把生成图片/视频上传到用户自己的 Drive）
google_drive:
  client_id: "1061411180296-c1doqeur6u7aboi5dkosic42o9m402td.apps.googleusercontent.com"
  client_secret: ""
  # 需与 Google Cloud Console 中配置的 OAuth 回调地址一致
  redirect_uri: "http://localhost:3001/api/media/google-drive/auth/callback"
  # 上传/展示统一使用的目录名（不存在会自动创建）
  folder_name: "chaya"

# TTS (Text-to-Speech) 配置
tts:
  elevenlabs:
    api_key: ""
    api_base: "https://api.elevenlabs.io/v1"
    default_model: "eleven_multilingual_v2"
    default_voice_id: ""
    output_format: "mp3_44100_128"
    optimize_streaming_latency: 0

# Discord Bot 集成（Chaya 接入 Discord，每频道独立 Actor + 独立消息历史）
discord:
  bot_token: ""                      # Discord Bot Token（Developer Portal 获取）
  auto_start: true                  # 应用启动时是否自动启动 Bot
  auto_create_session: true          # 未绑定频道 @Chaya 时自动创建专属 session
  default_trigger_mode: "mention"    # 默认触发方式：mention（仅 @ 回复）/ all（所有消息回复）
  default_llm_config_id: ""         # 自动创建 session 时使用的 LLM（空则继承 agent_chaya）
  max_response_length: 1900          # 单条 Discord 消息字数上限（留余量）

# 默认 Agent Chaya 配置
chaya:
  name: "Chaya"
  system_prompt: |
    你是 Chaya，一个友善、聪明的 AI 助手。你具有以下特点：

    1. **乐于助人**：始终以用户需求为中心，提供清晰、准确的回答
    2. **善于沟通**：用中文回复，表达自然流畅，必要时使用表情增添亲和力
    3. **专业可靠**：对技术问题给出专业建议，对不确定的内容会诚实说明
    4. **富有个性**：保持温暖友好的态度，适当展现幽默感

    请根据用户的问题提供帮助，让每次对话都愉快而有价值。
  # 头像使用前端 logo（将在初始化时自动转换为 base64）
  avatar_path: "../front/assets/app_logo_light.png"